<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini 2D Resource Game</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>
    <aside id="ui">
      <h1>Mini 2D Engine</h1>
      <div class="sidebar-menu" id="sidebarMenu" role="tablist" aria-label="Sidebar sections">
        <button class="menu-btn" data-panel="buildPanel" role="tab" aria-selected="false">Build</button>
        <button class="menu-btn" data-panel="storageBox" role="tab" aria-selected="false">Storage</button>
        <button class="menu-btn active" data-panel="npcBox" role="tab" aria-selected="true">NPCs</button>
      </div>
      <div class="sidebar-content">
      <div id="buildPanel" class="panel sidebar-panel" role="tabpanel">
        <h3>Build</h3>
        <div class="build-list" aria-label="Buildable structures">
          <button id="buildStockpileBtn" class="build-item" type="button" title="Stockpile" aria-pressed="false">
            <span class="build-icon" aria-hidden="true">🪵</span>
            <span class="build-meta">
              <span class="build-name">Stockpile</span>
              <span class="build-desc">Basic resource drop-off and storage point.</span>
            </span>
          </button>
        </div>
        <p class="hint">More structures coming soon.</p>
      </div>
      <div id="storageBox" class="panel sidebar-panel" role="tabpanel">
        <h3>Storage</h3>
        <div id="storageList"></div>
      </div>
      <div id="npcBox" class="panel sidebar-panel active" role="tabpanel">
        <h3>NPCs</h3>
        <div class="npc-panel-actions">
          <button id="addNpc" class="npc-add-btn">Add NPC</button>
        </div>
        <div id="npcList"></div>
      </div>
      <!-- legend moved to footer -->
      <p class="hint">Select an NPC from the list, then click a resource on the map to assign a gather task. Tasks queue per NPC.</p>
      </div>
    </aside>
  </div>
  <script type="module" src="src/main.js"></script>

  <footer id="mapFooter">
    <div class="legend-footer">
      <div class="legend-item"><span class="swatch tree"></span><span class="legend-label">Tree</span></div>
      <div class="legend-item"><span class="swatch stone"></span><span class="legend-label">Stone</span></div>
      <div class="legend-item"><span class="swatch iron"></span><span class="legend-label">Iron</span></div>
      <div class="legend-item"><span class="swatch copper"></span><span class="legend-label">Copper</span></div>
      <div class="legend-item"><span class="swatch gold"></span><span class="legend-label">Gold</span></div>
      <div class="legend-item"><span class="swatch storage"></span><span class="legend-label">Storage</span></div>
    </div>
  </footer>
</body>
</html>
